<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Transmigo</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>

    <header class="app-header">
      <h1>Transmigo</h1>
    </header>

    <main class="Translationwrapper deck-layout">
      <div class="decks-dashboard-container">
        
        <div class="deck-browser-group">
          
          <div class="deck-panel">
            <div class="panel-title">Decks</div>
            <div class="scrollable-list">
              <div class="deck-list">📂 Spanish 101</div>
              <div class="deck-list">📂 Travel Phrases</div>
              <div class="deck-list">📂 Verb Tenses</div>
            </div>
          </div>

          <div class="card-list">
            <div class="panel-title">Card Browser</div>
            <div class="scrollable-list">
              <div class="deck-list">Where is the b...</div>
              <div class="deck-list">How much does...</div>
              <div class="deck-list">Good morning,...</div>
              <div class="deck-list">Thank you ver...</div>
            </div>
          </div>

        </div>


        <div class="deck-workshop"> 

        <div class="workspace-header">
          <h3>Card Editor</h3>
          <button class="create-card-btn">+ New Card</button>
        </div>

        <form class="workshop-form">
        <div class="form-field">
          <label>Front</label>
          <input type="text" value="Where is the bathroom?" placeholder="Enter front text...">
          </div>
            <div class="form-field">
              <label>Back</label>
              <input type="text" value="¿Dónde está el baño?" placeholder="Enter back translation...">
            </div>

            <div class="workspace-actions">
              <button type="submit" class="workspace-save-btn">Save Changes</button>
              <button type="button" class="workspace-delete-btn">Delete Card</button>
            </div>
            </form>

          <div class="workspace-footer">
            <span>Deck: Travel Phrases</span>
            <span>ID: card_09x8821</span>
          </div>

        </div>

      </div>
    </main>
  
    <nav class="bottom-nav">
      <a href="Translation.html" class="nav-item">Translate</a>
      <a href="Review.html" class="nav-item">Review</a>
      <a href="decks.html" class="nav-item active">Decks</a>
      <a href="profile.html" class="nav-item">Profiles</a>
    </nav>

  </body>
</html>
